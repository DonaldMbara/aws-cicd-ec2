version: 0.0
os: linux

files:
  - source: /
    destination: /home/ec2-user/my-api
    file_exists_behavior: OVERWRITE

hooks:
  BeforeInstall:
    - location: scripts/stop_app.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/install_deps.sh
      timeout: 120
      runas: root

  ApplicationStart:
    - location: scripts/start_app.sh
      timeout: 60
      runas: root

  ValidateService:
    - location: scripts/validate.sh
      timeout: 60
      runas: root
